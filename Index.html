<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Parola del Giorno</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F5AA99;
      --ink: #1a1408;
      --terracotta: #c8553d;
      --gold: #c9972b;
      --muted: #8a7f6e;
      --card: #fffdf7;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background-image:
        radial-gradient(ellipse at 10% 20%, rgba(200,85,61,0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 80%, rgba(201,151,43,0.07) 0%, transparent 50%);
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.6s ease both;
    }

    header .flag { font-size: 2rem; margin-bottom: 0.4rem; }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header .subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 4px 40px rgba(26,20,8,0.10), 0 1px 4px rgba(26,20,8,0.06);
      border: 1px solid rgba(201,151,43,0.15);
      animation: fadeUp 0.7s ease both;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--terracotta), var(--gold));
    }

    .date-badge {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }

    .pos-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--terracotta);
      background: rgba(200,85,61,0.09);
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      margin-bottom: 0.6rem;
    }

    .word {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 8vw, 3.5rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -1px;
    }

    .phonetic {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(26,20,8,0.08);
      margin: 1.4rem 0;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }

    .definition {
      font-size: 1.05rem;
      line-height: 1.65;
    }

    .example {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.6;
      padding-left: 1rem;
      border-left: 2px solid var(--gold);
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    button {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.65rem 1.3rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s;
      letter-spacing: 0.02em;
    }

    button:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--terracotta);
      color: #fff;
      box-shadow: 0 2px 10px rgba(200,85,61,0.25);
    }

    .btn-primary:hover { opacity: 0.88; }

    .btn-secondary {
      background: transparent;
      color: var(--ink);
      border: 1px solid rgba(26,20,8,0.18);
    }

    .btn-secondary:hover { background: rgba(26,20,8,0.04); }

    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      animation: fadeUp 0.9s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeUp 0.45s ease both; }
  </style>
</head>
<body>

  <header>
    <div class="flag">🇮🇹</div>
    <h1>Parola del Giorno</h1>
    <p class="subtitle">Italian Word of the Day</p>
  </header>

  <div class="card">
    <div class="date-badge" id="dateBadge"></div>
    <div id="content"></div>
    <div class="actions">
      <button class="btn-primary" onclick="loadRandom()">🎲 Random Word</button>
      <button class="btn-secondary" onclick="loadToday()">📅 Today's Word</button>
    </div>
  </div>

  <footer>italiano-insieme.eu</footer>

  <script>
    // ── Curated word list (B1-B2) ─────────────────────────────────────────────
    // To add more words: copy any line and fill in word, pos, phonetic, definition, example
    const wordList = [
      { word: "temere",        pos: "verb",       phonetic: "te-mé-re",          definition: "To fear or be afraid of something or someone.",                                      example: "Temo che sia troppo tardi. — I fear it's too late." },
      { word: "sperare",       pos: "verb",       phonetic: "spe-rá-re",         definition: "To hope for something desired or expected.",                                         example: "Spero che tu stia bene. — I hope you are well." },
      { word: "fingere",       pos: "verb",       phonetic: "fín-ge-re",         definition: "To pretend or fake something.",                                                      example: "Stava fingendo di dormire. — He was pretending to sleep." },
      { word: "cedere",        pos: "verb",       phonetic: "cé-de-re",          definition: "To give in, surrender, or yield to something.",                                     example: "Non cedere alla pressione. — Don't give in to pressure." },
      { word: "cogliere",      pos: "verb",       phonetic: "cò-glie-re",        definition: "To seize or take advantage of a moment or opportunity.",                           example: "Ha colto l'occasione al volo. — He seized the opportunity." },
      { word: "affrontare",    pos: "verb",       phonetic: "af-fron-tá-re",     definition: "To face or deal with a problem or difficult situation.",                           example: "Dobbiamo affrontare il problema insieme. — We must face the problem together." },
      { word: "condividere",   pos: "verb",       phonetic: "con-di-ví-de-re",   definition: "To share something with others.",                                                   example: "Vuoi condividere le tue idee? — Do you want to share your ideas?" },
      { word: "raggiungere",   pos: "verb",       phonetic: "rag-giún-ge-re",    definition: "To reach, achieve, or catch up with someone or something.",                        example: "Ha raggiunto il suo obiettivo. — She reached her goal." },
      { word: "risolvere",     pos: "verb",       phonetic: "ri-sól-ve-re",      definition: "To solve or resolve a problem.",                                                    example: "Riusciamo a risolvere questo? — Can we solve this?" },
      { word: "promettere",    pos: "verb",       phonetic: "pro-mét-te-re",     definition: "To promise something to someone.",                                                  example: "Ti prometto che tornerò. — I promise I will come back." },
      { word: "ricordare",     pos: "verb",       phonetic: "ri-cor-dá-re",      definition: "To remember or remind someone of something.",                                      example: "Ricordi il primo giorno di scuola? — Do you remember the first day of school?" },
      { word: "dimenticare",   pos: "verb",       phonetic: "di-men-ti-cá-re",   definition: "To forget something or someone.",                                                   example: "Ho dimenticato le chiavi a casa. — I forgot the keys at home." },
      { word: "costruire",     pos: "verb",       phonetic: "co-struí-re",       definition: "To build or construct something.",                                                  example: "Vogliono costruire un ponte nuovo. — They want to build a new bridge." },
      { word: "superare",      pos: "verb",       phonetic: "su-pe-rá-re",       definition: "To overcome, exceed, or get past something.",                                      example: "Ha superato l'esame con ottimi voti. — She passed the exam with excellent grades." },
      { word: "scegliere",     pos: "verb",       phonetic: "scé-glie-re",       definition: "To choose or select between options.",                                              example: "È difficile scegliere tra le due. — It's hard to choose between the two." },
      { word: "rinunciare",    pos: "verb",       phonetic: "ri-nun-ciá-re",     definition: "To give up or renounce something.",                                                 example: "Non voglio rinunciare ai miei sogni. — I don't want to give up my dreams." },
      { word: "accettare",     pos: "verb",       phonetic: "ac-cet-tá-re",      definition: "To accept or agree to something.",                                                  example: "Ha accettato l'offerta di lavoro. — He accepted the job offer." },
      { word: "rifiutare",     pos: "verb",       phonetic: "ri-fiu-tá-re",      definition: "To refuse or reject something.",                                                    example: "Ha rifiutato l'invito alla festa. — She refused the party invitation." },
      { word: "ammettere",     pos: "verb",       phonetic: "am-mét-te-re",      definition: "To admit or acknowledge something, often a mistake.",                              example: "Devi ammettere i tuoi errori. — You must admit your mistakes." },
      { word: "sostenere",     pos: "verb",       phonetic: "so-ste-né-re",      definition: "To support, maintain, or uphold someone or something.",                           example: "Ti sosterrò sempre. — I will always support you." },
      { word: "abbandonare",   pos: "verb",       phonetic: "ab-ban-do-ná-re",   definition: "To abandon or leave behind a person or place.",                                    example: "Non abbandonare mai i tuoi amici. — Never abandon your friends." },
      { word: "nascondere",    pos: "verb",       phonetic: "na-scón-de-re",     definition: "To hide something or keep it secret.",                                              example: "Dove hai nascosto le chiavi? — Where did you hide the keys?" },
      { word: "scoprire",      pos: "verb",       phonetic: "sco-prí-re",        definition: "To discover or uncover something unknown.",                                         example: "Ho scoperto un ristorante fantastico. — I discovered a fantastic restaurant." },
      { word: "convincere",    pos: "verb",       phonetic: "con-vín-ce-re",     definition: "To convince or persuade someone of something.",                                    example: "Riesci a convincerlo? — Can you convince him?" },
      { word: "dubitare",      pos: "verb",       phonetic: "du-bi-tá-re",       definition: "To doubt or be uncertain about something.",                                         example: "Non dubito delle tue capacità. — I don't doubt your abilities." },
      { word: "immaginare",    pos: "verb",       phonetic: "im-ma-gi-ná-re",    definition: "To imagine or picture something in your mind.",                                    example: "Immagina un mondo senza guerre. — Imagine a world without wars." },
      { word: "realizzare",    pos: "verb",       phonetic: "re-a-liz-zá-re",    definition: "To make something happen; also to suddenly understand.",                           example: "Ha realizzato il suo sogno. — He made his dream a reality." },
      { word: "proteggere",    pos: "verb",       phonetic: "pro-tég-ge-re",     definition: "To protect or defend someone or something from harm.",                             example: "Dobbiamo proteggere l'ambiente. — We must protect the environment." },
      { word: "riconoscere",   pos: "verb",       phonetic: "ri-co-nó-sce-re",   definition: "To recognize someone; to acknowledge a fact.",                                     example: "L'ho riconosciuto subito. — I recognized him immediately." },
      { word: "sfidare",       pos: "verb",       phonetic: "sfi-dá-re",         definition: "To challenge someone or dare to do something.",                                     example: "Ti sfido a battere il mio record. — I challenge you to beat my record." },
      { word: "rispettare",    pos: "verb",       phonetic: "ri-spet-tá-re",     definition: "To respect or show regard for someone or a rule.",                                example: "Bisogna rispettare le regole. — We must respect the rules." },
      { word: "tradire",       pos: "verb",       phonetic: "tra-dí-re",         definition: "To betray someone's trust.",                                                        example: "Non tradire mai la fiducia degli altri. — Never betray others' trust." },
      { word: "perdonare",     pos: "verb",       phonetic: "per-do-ná-re",      definition: "To forgive someone for a wrong they have done.",                                   example: "Riesci a perdonarmi? — Can you forgive me?" },
      { word: "consigliare",   pos: "verb",       phonetic: "con-si-gliá-re",    definition: "To advise or recommend something to someone.",                                     example: "Ti consiglio di studiare ogni giorno. — I advise you to study every day." },
      { word: "lamentarsi",    pos: "verb",       phonetic: "la-men-tár-si",     definition: "To complain or moan about something.",                                              example: "Si lamenta sempre del lavoro. — He always complains about work." },
      { word: "esagerare",     pos: "verb",       phonetic: "e-sa-ge-rá-re",     definition: "To exaggerate or overstate something.",                                             example: "Stai esagerando! — You are exaggerating!" },
      { word: "affascinare",   pos: "verb",       phonetic: "af-fa-sci-ná-re",   definition: "To fascinate or charm someone greatly.",                                           example: "La cultura italiana mi affascina. — Italian culture fascinates me." },
      { word: "deludere",      pos: "verb",       phonetic: "de-lú-de-re",       definition: "To disappoint or let someone down.",                                                example: "Non voglio deluderti. — I don't want to disappoint you." },
      { word: "meravigliarsi", pos: "verb",       phonetic: "me-ra-vi-gliár-si", definition: "To be amazed or astonished by something.",                                         example: "Mi meraviglio sempre della sua pazienza. — I'm always amazed by her patience." },
      { word: "vergognarsi",   pos: "verb",       phonetic: "ver-go-gnár-si",    definition: "To feel ashamed or embarrassed about something.",                                  example: "Non ti vergognare degli errori. — Don't be ashamed of your mistakes." },
      { word: "fidarsi",       pos: "verb",       phonetic: "fi-dár-si",         definition: "To trust someone or rely on them.",                                                 example: "Mi fido completamente di te. — I trust you completely." },
      { word: "arrabbiarsi",   pos: "verb",       phonetic: "ar-rab-biár-si",    definition: "To get angry or lose one's temper.",                                                example: "Non arrabbiarti per così poco! — Don't get angry over so little!" },
      { word: "innamorarsi",   pos: "verb",       phonetic: "in-na-mo-rár-si",   definition: "To fall in love with someone.",                                                     example: "Si è innamorato di lei al primo sguardo. — He fell in love with her at first sight." },
      { word: "coraggio",      pos: "noun (m)",   phonetic: "co-rág-gio",        definition: "Courage; the strength to face fear or difficulty.",                                example: "Ci vuole coraggio per cambiare vita. — It takes courage to change your life." },
      { word: "fiducia",       pos: "noun (f)",   phonetic: "fi-dú-cia",         definition: "Trust or confidence in someone or something.",                                     example: "Ho molta fiducia in te. — I have a lot of trust in you." },
      { word: "pazienza",      pos: "noun (f)",   phonetic: "pa-ziénza",         definition: "Patience; the ability to wait calmly.",                                            example: "La pazienza è una virtù. — Patience is a virtue." },
      { word: "consapevole",   pos: "adjective",  phonetic: "con-sa-pé-vo-le",   definition: "Aware or conscious of something.",                                                 example: "È consapevole dei suoi limiti. — He is aware of his limits." },
      { word: "ingenuo",       pos: "adjective",  phonetic: "in-gé-nuo",         definition: "Naive or overly trusting; lacking worldly experience.",                           example: "Non essere così ingenuo! — Don't be so naive!" },
      { word: "ostinato",      pos: "adjective",  phonetic: "o-sti-ná-to",       definition: "Stubborn or persistent; unwilling to change.",                                     example: "È troppo ostinato per ascoltare. — He's too stubborn to listen." },
      { word: "curioso",       pos: "adjective",  phonetic: "cu-rió-so",         definition: "Curious or eager to know and learn.",                                              example: "I bambini sono naturalmente curiosi. — Children are naturally curious." },
    ];

    // ── Date seed: same word for everyone on the same day ────────────────────
    function getDayIndex() {
      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 0);
      return Math.floor((now - start) / 86400000);
    }

    function formatDate() {
      return new Date().toLocaleDateString('en-GB', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function render(entry) {
      document.getElementById('content').innerHTML = `
        <div class="fade-in">
          <span class="pos-badge">${entry.pos}</span>
          <div class="word">${entry.word}</div>
          <div class="phonetic">${entry.phonetic}</div>
        </div>
        <hr class="divider"/>
        <div class="fade-in">
          <p class="section-label">Definition</p>
          <p class="definition">${entry.definition}</p>
        </div>
        <hr class="divider"/>
        <div class="fade-in">
          <p class="section-label">Example</p>
          <p class="example">${entry.example}</p>
        </div>
      `;
    }

    function loadToday() {
      document.getElementById('dateBadge').textContent = formatDate();
      render(wordList[getDayIndex() % wordList.length]);
    }

    function loadRandom() {
      document.getElementById('dateBadge').textContent = '🎲 Random pick';
      render(wordList[Math.floor(Math.random() * wordList.length)]);
    }

    loadToday();
  </script>
</body>
</html>
